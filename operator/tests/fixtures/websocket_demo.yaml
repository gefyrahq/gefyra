apiVersion: apps/v1
kind: Deployment
metadata:
  name: websocket-deployment
  labels:
    app: websocket
spec:
  selector:
    matchLabels:
      app: websocket
  replicas: 1
  template:
    metadata:
      labels:
        app: websocket
    spec:
      containers:
      - name: websocket
        image: quay.io/gefyra/gefyra-tesocket:0.1.0
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: websocket
  namespace: default
spec:
  selector:
    app: websocket
  ports:
  - protocol: TCP
    port: 5002
    targetPort: 8000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: websocket
  namespace: default
  annotations:
    ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: websocket
            port:
              number: 5002