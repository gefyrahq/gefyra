name: Ruff Linter

on: 
  push:
    branches: [ main ]
    paths-ignore:
      - gefyra-docs/**
  pull_request:
    branches: [ main ]
    paths-ignore:
      - gefyra-docs/**

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v7.0.0
    - uses: astral-sh/ruff-action@v4.0.0

          
