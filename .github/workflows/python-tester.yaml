name: pytest and try it yourself example

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ "**" ]

jobs:
  build_test_image:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    # https://github.com/docker/setup-qemu-action
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    # https://github.com/docker/setup-buildx-action
    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v4

    - name: PyServer Test Image meta
      id: test_image_meta
      uses: docker/metadata-action@v5
      with:
        flavor: |
          latest=false
        images: |
          gefyra/pyserver
        tags: |
          type=ref,event=pr,enable=${{ !!github.event.pull_request }}
          type=raw,value=test-run-${{ github.run_id }},enable=${{ !github.event.pull_request }}
        labels: |
          quay.expires-after=24h
    - name: Build and push
      uses: docker/build-push-action@v6
      env:
        DOCKER_BUILD_SUMMARY: false
      with:
        context: testing/images/
        platforms: linux/amd64
        push: false
        load: true
        file: testing/images/Dockerfile.local
        tags: pyserver
        outputs: type=docker,dest=/tmp/pyserver.tar
    - name: Upload pyserver image
      uses: actions/upload-artifact@v6
      with:
        name: pyserver
        path: /tmp/pyserver.tar
  
  build_carrier:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.carrier2_meta.outputs.tags }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    # https://github.com/docker/setup-qemu-action
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    # https://github.com/docker/setup-buildx-action
    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v4
    - name: Login to quay.io
      uses: docker/login-action@v3
      with:
        registry: quay.io
        username: ${{ secrets.QUAY_ROBOT }}
        password: ${{ secrets.QUAY_ROBOT_TOKEN }}
    - name: Carrier2 Image meta
      id: carrier2_meta
      uses: docker/metadata-action@v5
      with:
        flavor: |
          latest=false
        images: |
          quay.io/gefyra/carrier2
        tags: |
          type=raw,value=test-run-${{ github.run_id }},enable=${{ !github.event.pull_request }}
          type=ref,event=pr,enable=${{ !!github.event.pull_request }}
        labels: |
          quay.expires-after=24h
    - name: Build and push
      uses: docker/build-push-action@v6
      env:
        DOCKER_BUILD_SUMMARY: false
      with:
        context: carrier2/
        platforms: linux/amd64
        push: true
        load: false
        tags: ${{ steps.carrier2_meta.outputs.tags }}
        labels: ${{ steps.carrier2_meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        outputs: type=docker,dest=/tmp/carrier.tar
        build-args: COMMIT_SHA=${{ github.sha }}
    - name: Upload carrier image
      uses: actions/upload-artifact@v6
      with:
        name: carrier
        path: /tmp/carrier.tar

  build_operator:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.operator_meta.outputs.tags }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    # https://github.com/docker/setup-qemu-action
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    # https://github.com/docker/setup-buildx-action
    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v4
    - name: Login to quay.io
      uses: docker/login-action@v3
      with:
        registry: quay.io
        username: ${{ secrets.QUAY_ROBOT }}
        password: ${{ secrets.QUAY_ROBOT_TOKEN }}
    #
    # Gefyra Operator
    #
    - name: Operator Image meta
      id: operator_meta
      uses: docker/metadata-action@v5
      with:
        flavor: |
          latest=false
        images: |
          quay.io/gefyra/operator
        tags: |
          type=raw,value=test-run-${{ github.run_id }},enable=${{ !github.event.pull_request }}
          type=ref,event=pr,enable=${{ !!github.event.pull_request }}
        labels: |
          quay.expires-after=24h
    - name: Build and push
      uses: docker/build-push-action@v6
      env:
        DOCKER_BUILD_SUMMARY: false
      with:
        context: operator/
        platforms: linux/amd64
        push: true
        load: false
        tags: ${{ steps.operator_meta.outputs.tags }}
        labels: ${{ steps.operator_meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        outputs: type=docker,dest=/tmp/operator.tar
        build-args: COMMIT_SHA=${{ github.sha }}
    - name: Upload operator image
      uses: actions/upload-artifact@v6
      with:
        name: operator
        path: /tmp/operator.tar

  

  build_cargo:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.cargo_meta.outputs.tags }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    # https://github.com/docker/setup-qemu-action
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    # https://github.com/docker/setup-buildx-action
    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v4
    #
    # Gefyra Cargo
    #
    - name: Cargo Image meta
      id: cargo_meta
      uses: docker/metadata-action@v5
      with:
        flavor: |
          latest=false
        images: |
          quay.io/gefyra/cargo
        tags: |
          type=raw,value=test-run-${{ github.run_id }},enable=${{ !github.event.pull_request }}
          type=ref,event=pr,enable=${{ !!github.event.pull_request }}
        labels: |
          quay.expires-after=24h
    - name: Build and push
      uses: docker/build-push-action@v6
      env:
        DOCKER_BUILD_SUMMARY: false
      with:
        context: cargo/
        platforms: linux/amd64
        push: false
        target: cargo
        tags: ${{ steps.cargo_meta.outputs.tags }}
        labels: ${{ steps.cargo_meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        outputs: type=docker,dest=/tmp/cargo.tar
    - name: Upload cargo image
      uses: actions/upload-artifact@v6
      with:
        name: cargo
        path: /tmp/cargo.tar

  build_stowaway:
    runs-on: ubuntu-latest
    outputs:
      tags: ${{ steps.stowaway_meta.outputs.tags }}
    steps:
    - name: Checkout
      uses: actions/checkout@v6
    # https://github.com/docker/setup-qemu-action
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    # https://github.com/docker/setup-buildx-action
    - name: Set up Docker Buildx
      id: buildx
      uses: docker/setup-buildx-action@v4
    #
    # Gefyra Stowaway
    #
    - name: Stowaway Image meta
      id: stowaway_meta
      uses: docker/metadata-action@v5
      with:
        flavor: |
          latest=false
        images: |
          quay.io/gefyra/stowaway
        tags: |
          type=raw,value=test-run-${{ github.run_id }},enable=${{ !github.event.pull_request }}
          type=ref,event=pr,enable=${{ !!github.event.pull_request }}
        labels: |
          quay.expires-after=24h
    - name: Build and push
      uses: docker/build-push-action@v6
      env:
        DOCKER_BUILD_SUMMARY: false
      with:
        context: stowaway/
        platforms: linux/amd64
        push: false
        tags: ${{ steps.stowaway_meta.outputs.tags }}
        labels: ${{ steps.stowaway_meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        outputs: type=docker,dest=/tmp/stowaway.tar
    - name: Upload stowaway image
      uses: actions/upload-artifact@v6
      with:
        name: stowaway
        path: /tmp/stowaway.tar
        

  test_client:
    name: Pytest Gefyra Client
    needs:
      - build_cargo
      - build_operator
      - build_carrier
      - build_stowaway
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set fake kubeconfig
        shell: bash
        run: |
          mkdir -p ~/.kube/
          cd ~/.kube
          touch config
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: '2.1.1'
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true
      - name: Install dependencies
        working-directory: ./client
        run: poetry install --with dev --no-interaction --no-root
      - name: Install k3d
        run: curl --silent --fail https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | TAG=v5.8.3 bash
      - name: Download cargo artifact
        uses: actions/download-artifact@v7
        with:
          name: cargo
          path: /tmp/cargo
      - name: Download operator artifact
        uses: actions/download-artifact@v7
        with:
          name: operator
          path: /tmp/operator
      - name: Download carrier artifact
        uses: actions/download-artifact@v7
        with:
          name: carrier
          path: /tmp/carrier
      - name: Download stowaway artifact
        uses: actions/download-artifact@v7
        with:
          name: stowaway
          path: /tmp/stowaway
      - name: Load pre-built images
        run: |
          docker load --input /tmp/cargo/cargo.tar
          docker load --input /tmp/operator/operator.tar
          docker load --input /tmp/carrier/carrier.tar
          docker load --input /tmp/stowaway/stowaway.tar
          docker tag ${{ needs.build_cargo.outputs.tags }} quay.io/gefyra/cargo:2.4.0
          docker tag ${{ needs.build_operator.outputs.tags }} operator:pytest
          docker tag ${{ needs.build_carrier.outputs.tags }} carrier2:pytest
          docker tag ${{ needs.build_stowaway.outputs.tags }} stowaway:pytest
          docker image ls -a
      - name: Run Gefyra Client Unit Test
        working-directory: ./client
        run: poetry run coverage run --append -m pytest --retries 5 -x tests/unit
        env:
          CARRIER_IN_CACHE: true
          OPERATOR_IN_CACHE: true
          CARGO_IN_CACHE: true
          STOWAWAY_IN_CACHE: true
      - name: Run Gefyra Client E2E Test
        working-directory: ./client
        run: poetry run coverage run --append -m pytest --retries 5 -x tests/e2e
        env:
          CARRIER_IN_CACHE: true
          OPERATOR_IN_CACHE: true
          CARGO_IN_CACHE: true
          STOWAWAY_IN_CACHE: true
      - name: Upload coverage data to coveralls.io
        if: github.repository == 'gefyrahq/gefyra'
        working-directory: ./client
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
          COVERALLS_FLAG_NAME: client
          COVERALLS_PARALLEL: true
        run: poetry run coveralls --service=github-actions
      - uses: actions/upload-artifact@v6
        with:
          name: coverage_data
          path: ./client/.coverage*

  test_carrier2:
    name: Pytest Gefyra carrier2
    needs:
      - build_carrier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set fake kubeconfig
        shell: bash
        run: |
          mkdir -p ~/.kube/
          cd ~/.kube
          touch config
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: '2.1.1'
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true
      - name: Install dependencies
        working-directory: ./carrier2
        run: poetry install --with dev --no-interaction --no-root
      - name: Install k3d
        run: curl --silent --fail https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | TAG=v5.8.3 bash
      - name: Download carrier artifact
        uses: actions/download-artifact@v7
        with:
          name: carrier
          path: /tmp/carrier
      - name: Load pre-built images
        run: |
          docker load --input /tmp/carrier/carrier.tar
          docker tag ${{ needs.build_carrier.outputs.tags }} carrier2:pytest
          docker image ls -a
      - name: Run PyTest for carrier2
        working-directory: ./carrier2
        run: poetry run pytest -x tests/
        env:
          CARRIER_IN_CACHE: true



  test_minikube:
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            driver: ''
            kubectl_os: linux
    needs:
      - build_operator
      - build_cargo
      - build_test_image
      - build_stowaway
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      # https://github.com/opensafely-core/job-server/issues/3429
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: '2.1.1'
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true
      - name: Set Gefyra tracking config / fake kubeconfig
        shell: bash
        run: |
          mkdir -p ~/.kube
          cd ~/.kube
          touch config
      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          path: /tmp
      - name: start minikube
        id: minikube
        uses: medyagh/setup-minikube@latest
        with:
          start-args: --ports 127.0.0.1:31820:31820/udp
      - name: Load Cargo image on host Docker
        run: |
          docker load --input /tmp/cargo/cargo.tar
          docker tag ${{ needs.build_cargo.outputs.tags }} quay.io/gefyra/cargo:2.4.0
          docker image ls -a
      - name: Load Gefyra images into Minikube
        run: |
          eval $(minikube docker-env)
          docker load --input /tmp/pyserver/pyserver.tar
          docker load --input /tmp/stowaway/stowaway.tar
          docker load --input /tmp/operator/operator.tar
          docker tag ${{ needs.build_operator.outputs.tags }} quay.io/gefyra/operator:2.4.0
          docker tag ${{ needs.build_stowaway.outputs.tags }} quay.io/gefyra/stowaway:2.4.0
          docker image ls -a
      - name: Install dependencies
        working-directory: ./client
        run: poetry install --with dev --no-interaction --no-root
      - name: Run gefyra up
        timeout-minutes: 15
        working-directory: ./client
        run: |
          poetry run coverage run --append -a -m gefyra.cli.main --debug up --minikube
      - name: Show cargo logs
        working-directory: ./client
        if: ${{ failure() }}
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/${{ matrix.kubectl_os }}/amd64/kubectl"
          chmod +x ./kubectl
          ./kubectl get pod -n gefyra
          ./kubectl logs -n gefyra gefyra-stowaway-0
          ./kubectl logs --previous -n gefyra deploy/gefyra-operator-webhook
          ./kubectl logs -n gefyra deploy/gefyra-operator-webhook
          ./kubectl describe pods -n gefyra -l gefyra.dev/role=webhook
          ./kubectl logs -n gefyra deploy/gefyra-operator
          docker inspect minikube
          docker inspect gefyra-cargo-default
          docker logs gefyra-cargo-default
      - name: Show coverage report
        working-directory: ./client
        run: |
          poetry run coverage report
      - name: Upload coverage data to coveralls.io
        if: github.repository == 'gefyrahq/gefyra'
        working-directory: ./client
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
          COVERALLS_FLAG_NAME: client
          COVERALLS_PARALLEL: true
        run: |
          poetry run coveralls --service=github-actions
      - uses: actions/upload-artifact@v6
        with:
          name: coverage_data-${{ matrix.os }}
          path: ./client/.coverage*

  test_operator:
    name: Pytest Gefyra Operator
    needs:
      - build_cargo
      - build_operator
      - build_carrier
      - build_stowaway
    runs-on: ubuntu-latest
    steps:
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: '2.1.1'
          virtualenvs-create: true
          virtualenvs-in-project: true
          installer-parallel: true
      - name: Install dependencies
        working-directory: ./operator
        run: poetry install --with dev --no-interaction --no-root
      - name: Install k3d
        run: curl --silent --fail https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | TAG=v5.8.3 bash
      - name: Setup k3d
        working-directory: ./operator
        run: k3d cluster create --config tests/k3d_cluster.yaml && k3d kubeconfig get gefyra > mycluster.yaml
      - name: Download cargo artifact
        uses: actions/download-artifact@v7
        with:
          name: cargo
          path: /tmp/cargo
      - name: Download carrier artifact
        uses: actions/download-artifact@v7
        with:
          name: carrier
          path: /tmp/carrier
      - name: Download stowaway artifact
        uses: actions/download-artifact@v7
        with:
          name: stowaway
          path: /tmp/stowaway
      - name: Download operator artifact
        uses: actions/download-artifact@v7
        with:
          name: operator
          path: /tmp/operator
      - name: Load pre-built cargo image
        run: |
          docker load --input /tmp/cargo/cargo.tar
          docker load --input /tmp/operator/operator.tar
          docker load --input /tmp/carrier/carrier.tar
          docker load --input /tmp/stowaway/stowaway.tar
          docker tag ${{ needs.build_cargo.outputs.tags }} quay.io/gefyra/cargo:2.4.0
          docker tag ${{ needs.build_operator.outputs.tags }} operator:pytest
          docker tag ${{ needs.build_carrier.outputs.tags }} carrier2:pytest
          docker tag ${{ needs.build_stowaway.outputs.tags }} stowaway:pytest
          docker tag ${{ needs.build_cargo.outputs.tags }} cargo:pytest
          docker image ls -a
      - name: Run Gefyra Operator Unit Tests
        working-directory: ./operator
        run: poetry run coverage run --append -m pytest --k8s-kubeconfig-override mycluster.yaml --k8s-cluster-name gefyra --k8s-provider k3d -x --retries 5 tests/unit
        env:
          GEFYRA_CARGO_IMAGE_PREBUILT: cargo:pytest
          CARRIER_IN_CACHE: true
          OPERATOR_IN_CACHE: true
          CARGO_IN_CACHE: true
          STOWAWAY_IN_CACHE: true
      - name: Run Gefyra Operator Integration Tests
        working-directory: ./operator
        run: poetry run coverage run --append -m pytest --k8s-kubeconfig-override mycluster.yaml --k8s-cluster-name gefyra --k8s-provider k3d -x --retries 5 tests/integration
        env:
          GEFYRA_CARGO_IMAGE_PREBUILT: cargo:pytest
          CARRIER_IN_CACHE: true
          OPERATOR_IN_CACHE: true
          CARGO_IN_CACHE: true
          STOWAWAY_IN_CACHE: true
      - name: Run Gefyra Operator E2E Tests
        working-directory: ./operator
        run: poetry run coverage run --append -m pytest --k8s-kubeconfig-override mycluster.yaml --k8s-cluster-name gefyra --k8s-provider k3d -x --retries 5 tests/e2e
        env:
          GEFYRA_CARGO_IMAGE_PREBUILT: cargo:pytest
          CARRIER_IN_CACHE: true
          OPERATOR_IN_CACHE: true
          CARGO_IN_CACHE: true
          STOWAWAY_IN_CACHE: true
      - name: Upload coverage data to coveralls.io
        if: github.repository == 'gefyrahq/gefyra'
        working-directory: ./operator
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
          COVERALLS_FLAG_NAME: operator
          COVERALLS_PARALLEL: true
        run: poetry run coveralls --service=github-actions
    
  coveralls:
    name: Indicate completion to coveralls.io
    if: github.repository == 'gefyrahq/gefyra'
    # need secrets.GITHUB_TOKEN
    needs:
      - test_minikube
      - test_client
      - test_operator
    runs-on: ubuntu-latest
    container: python:3-slim
    steps:
      - name: Finished
        run: |
          pip3 install --upgrade coveralls
          coveralls --service=github-actions --finish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
