name: Publish Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate CLI documentation
        working-directory: ./client
        run: |
          pip install poetry
          poetry install --with cli
          poetry run gefyra-docs --output ../gefyra-docs/content/en/1.quick-start/5.cli.md
      - uses: actions/setup-node@v6
        with:
            node-version: '22'
      - name: Test Build
        working-directory: ./gefyra-docs
        run: |
          npm i
          npm run generate
          cp .output/public/en/index.html .output/public
      - name: Upload static files as artifact
        id: deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: gefyra-docs/.output/public

  deploy:
    permissions:
      id-token: write
      pages: write
    environment:
        name: github-pages
        url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
