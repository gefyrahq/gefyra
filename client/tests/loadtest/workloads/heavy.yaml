apiVersion: v1
kind: Service
metadata:
  name: hello-nginx-heavy
  labels:
    run: hello-nginx-heavy
    gefyra-loadtest: "true"
spec:
  ports:
  - port: 80
    protocol: TCP
    targetPort: 80
  selector:
    app: hello-nginx-heavy
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-nginxdemo-heavy
  labels:
    gefyra-loadtest: "true"
spec:
  selector:
    matchLabels:
      app: hello-nginx-heavy
  replicas: 3
  template:
    metadata:
      labels:
        app: hello-nginx-heavy
    spec:
      containers:
      - name: hello-nginx
        image: nginxdemos/hello
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "200m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hello-nginx-heavy
  namespace: default
  annotations:
    ingress.kubernetes.io/ssl-redirect: "false"
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: hello-nginx-heavy
            port:
              number: 80
