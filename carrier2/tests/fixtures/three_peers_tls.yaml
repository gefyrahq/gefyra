version: 1
threads: 2
error_log: "error.log"
probes: 
    httpGet:
        - 8019
        - 8020
        - 8021
    httpsGet:
        - 8023
proxy:
  - port: 8080
    tls:
        certificate: "./tests/fixtures/test_cert.pem"
        key: "./tests/fixtures/test_key.pem"
        sni: ""
    clusterUpstream: 
        - "127.0.0.1:4444"
    bridges:
        user-1:
            endpoint: "127.0.0.1:5443"
            rules:
                - match:
                    - matchHeader:
                        name: "x-gefyra"
                        value: "user-1"
        user-2:
            endpoint: "127.0.0.1:5444"
            rules:
                - match:
                    - matchHeader:
                        name: "x-gefyra"
                        value: "user-2"
        user-3:  
            endpoint: "127.0.0.1:5442"
            tls: false  # this client does not run with TLS
            rules:
                - match:
                    - matchHeader:
                        name: "x-gefyra"
                        value: "user-3"
  - port: 8081
    tls:
        certificate: "./tests/fixtures/test_cert.pem"
        key: "./tests/fixtures/test_key.pem"
        sni: ""
    clusterUpstream: 
        - "127.0.0.1:4444"
    bridges:
        user-1:
            endpoint: "127.0.0.1:5443"
            rules:
                - match:
                    - matchHeader:
                        name: "x-gefyra"
                        value: "user-1"
        user-2:
            endpoint: "127.0.0.1:5444"
            rules:
                - match:
                    - matchHeader:
                        name: "x-gefyra"
                        value: "user-2"
        user-3:  
            endpoint: "127.0.0.1:5442"
            tls: false  # this client does not run with TLS
            rules:
                - match:
                    - matchHeader:
                        name: "x-gefyra"
                        value: "user-3"

